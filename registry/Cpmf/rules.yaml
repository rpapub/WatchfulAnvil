package: Cpmf.WorkflowAnalyzerRules
namespace: Cpmf.Rules
version: "0.1.2"

categories:
  - code: L
    name: Logging and Observability
    description: Rules for traceability, diagnosability, and business-relevant execution evidence.
  - code: U
    name: Workflow Structure
    description: Rules for organizing workflows and components into understandable, bounded units.
  - code: N
    name: Naming and Intent
    description: Rules for naming workflows, arguments, variables, assets, queues, and components consistently.
  - code: F
    name: Processing Flow
    description: Rules for how logic is sequenced and composed, including pipeline-oriented processing style.

rules:
  - id: CPMF-L001
    className: LogMessageBookendsRule
    name: Log Message Bookends
    description: "Workflows annotated @module or @unit must have matching bookend Log Messages at start and end."
    recommendation: "Workflows annotated @module or @unit must begin and end with a Log Message matching the configured StartPrefix and EndPrefix."
    categoryCode: L
    scope: IWorkflowModel
    type: Rule
    defaultSeverity: Warning
    defaultIsEnabled: true
    requiredFeature: WorkflowAnalyzerV9
    documentationLink: "https://github.com/rpapub/WatchfulAnvil/wiki/Rule-Documentation-CPMF-L001"
    parameters:
      - key: StartPrefix
        displayName: Start log message prefix
        defaultValue: "Going to"
      - key: EndPrefix
        displayName: End log message prefix
        defaultValue: Finished

  - id: CPMF-U001
    className: UnitOutStatusRule
    name: Unit Out Status Argument
    description: "Workflows annotated @unit must declare an Out argument named out_Status."
    recommendation: "Workflows annotated @unit must declare an Out argument named out_Status."
    categoryCode: U
    scope: IWorkflowModel
    type: Rule
    defaultSeverity: Error
    defaultIsEnabled: true
    requiredFeature: WorkflowAnalyzerV9
    documentationLink: "https://github.com/rpapub/WatchfulAnvil/wiki/Rule-Documentation-CPMF-U001"
    parameters: []

  - id: CPMF-U002
    className: ModuleCodedConfigRule
    name: CodedConfig Argument
    description: "Workflows annotated @module or @pipeline must declare an In argument of type CodedConfig."
    recommendation: "Workflows annotated @module or @pipeline must declare an In argument of type CodedConfig (namespace may vary, e.g. MyProject.Config.CodedConfig)."
    categoryCode: U
    scope: IWorkflowModel
    type: Rule
    defaultSeverity: Error
    defaultIsEnabled: true
    requiredFeature: WorkflowAnalyzerV9
    documentationLink: "https://github.com/rpapub/WatchfulAnvil/wiki/Rule-Documentation-CPMF-U002"
    parameters: []

  - id: CPMF-U003
    className: NoFlowchartStateMachineRule
    name: No Flowchart or State Machine
    description: "Flowchart and State Machine activities are not permitted in any workflow."
    recommendation: "Flowchart and State Machine activities are not permitted. Use Sequence instead."
    categoryCode: U
    scope: IActivityModel
    type: Rule
    defaultSeverity: Error
    defaultIsEnabled: true
    requiredFeature: null
    documentationLink: "https://github.com/rpapub/WatchfulAnvil/wiki/Rule-Documentation-CPMF-U003"
    parameters: []

  - id: CPMF-N001
    className: VariableNamingRule
    name: Variable Naming Convention
    description: "Variable names must follow .NET camelCase conventions without underscores."
    recommendation: "Variable names must follow .NET camelCase conventions: start with a lowercase letter and contain no underscores. Avoid Hungarian notation prefixes."
    categoryCode: N
    scope: IActivityModel
    type: Rule
    defaultSeverity: Warning
    defaultIsEnabled: true
    requiredFeature: null
    documentationLink: "https://github.com/rpapub/WatchfulAnvil/wiki/Rule-Documentation-CPMF-N001"
    parameters: []

  - id: CPMF-F001
    className: SpecificContentAssignRule
    name: SpecificContent Assignment Must Use MultipleAssign
    description: "Assignments to TransactionItem.SpecificContent must be inside a Multiple Assign activity."
    recommendation: "Assignments to TransactionItem.SpecificContent must always be inside a Multiple Assign activity. Group all SpecificContent writes into a single Multiple Assign."
    categoryCode: F
    scope: IActivityModel
    type: Rule
    defaultSeverity: Error
    defaultIsEnabled: true
    requiredFeature: null
    documentationLink: "https://github.com/rpapub/WatchfulAnvil/wiki/Rule-Documentation-CPMF-F001"
    parameters: []

  - id: CPMF-N002
    className: WorkflowNameRule
    name: Workflow Filename Is Valid .NET Identifier
    description: "The workflow filename must be a valid .NET PascalCase identifier."
    recommendation: "The workflow filename (without extension) must be a valid .NET PascalCase identifier: start with an uppercase letter, contain only letters, digits, and underscores, and not start with a digit."
    categoryCode: N
    scope: IWorkflowModel
    type: Rule
    defaultSeverity: Error
    defaultIsEnabled: true
    requiredFeature: null
    documentationLink: "https://github.com/rpapub/WatchfulAnvil/wiki/Rule-Documentation-CPMF-N002"
    parameters: []

  - id: CPMF-U004
    className: StaleInvokeArgumentsRule
    name: InvokeWorkflowFile Argument Count Mismatch
    description: "The argument count on an InvokeWorkflowFile must match the target workflow."
    recommendation: "The number of arguments bound on an Invoke Workflow File activity does not match the number declared in the target workflow. Update the argument mappings."
    categoryCode: U
    scope: IWorkflowModel
    type: Rule
    defaultSeverity: Error
    defaultIsEnabled: true
    requiredFeature: WorkflowAnalyzerV9
    documentationLink: "https://github.com/rpapub/WatchfulAnvil/wiki/Rule-Documentation-CPMF-U004"
    parameters: []

  - id: CPMF-F002
    className: PipelineSequenceOrderRule
    name: Pipeline Structure
    description: "Workflows annotated @pipeline must have the required argument, structure, and stage sequence."
    recommendation: "Workflows annotated @pipeline must declare an In argument in_TransactionItem of type UiPath.Core.QueueItem and contain the configured pipeline stages as direct children of the root, in order."
    categoryCode: F
    scope: IWorkflowModel
    type: Rule
    defaultSeverity: Error
    defaultIsEnabled: true
    requiredFeature: WorkflowAnalyzerV9
    documentationLink: "https://github.com/rpapub/WatchfulAnvil/wiki/Rule-Documentation-CPMF-F002"
    parameters:
      - key: Stages
        displayName: Pipeline Stages (ordered, comma-separated)
        defaultValue: "Initialize,Ingest,Enrich,Decide,Execute,Complete,Finalize"

  - id: CPMF-F003
    className: PipelineDomainModelRule
    name: Pipeline Domain Model
    description: "Workflows annotated @pipeline must declare their domain model type in the annotation."
    recommendation: "Workflows annotated @pipeline must declare their domain model on a second annotation line: @domain-model:FullyQualifiedTypeName"
    categoryCode: F
    scope: IWorkflowModel
    type: Rule
    defaultSeverity: Error
    defaultIsEnabled: true
    requiredFeature: WorkflowAnalyzerV9
    documentationLink: "https://github.com/rpapub/WatchfulAnvil/wiki/Rule-Documentation-CPMF-F003"
    parameters: []

  - id: CPMF-N003
    className: ProjectNameRule
    name: Project Name Is Valid .NET Identifier
    description: "The project name must be a valid .NET PascalCase identifier."
    recommendation: "The project name must be a valid .NET PascalCase identifier: start with an uppercase letter, contain only letters, digits, and underscores, and not start with a digit. The project name is used as the root namespace."
    categoryCode: N
    scope: IProjectModel
    type: Rule
    defaultSeverity: Error
    defaultIsEnabled: true
    requiredFeature: null
    documentationLink: "https://github.com/rpapub/WatchfulAnvil/wiki/Rule-Documentation-CPMF-N003"
    parameters: []

  - id: CPMF-FC001
    className: PipelinePresenceCounter
    name: Pipeline Presence
    description: "The project must contain at least one workflow annotated @pipeline."
    recommendation: "A CPMF project must contain at least one workflow annotated @pipeline."
    categoryCode: F
    scope: IProjectModel
    type: Rule
    defaultSeverity: Error
    defaultIsEnabled: true
    requiredFeature: WorkflowAnalyzerV9
    documentationLink: "https://github.com/rpapub/WatchfulAnvil/wiki/Rule-Documentation-CPMF-FC001"
    parameters: []
